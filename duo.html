<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HL Terminal ×2</title>
<link rel="icon" href="data:,">
<!-- style.css を link し、#topbar / #wallet-btn / #split-btn / #settings-btn / #ticker の
     id を本体とあえて同じにして見た目を共有する（別ドキュメントなので id 重複にはならない） -->
<link rel="stylesheet" href="style.css?v=29">
<style>
  html, body { height: 100%; }
  #wrap { flex: 1; display: flex; min-height: 0; }
  #wrap iframe { flex: 1; min-width: 0; border: 0; }
  #wrap iframe + iframe { border-left: 2px solid var(--hairline); }
  #logo { margin-right: auto; }
  /* 共有アカウント欄（ポジション+オープンオーダー）。左ペインの app.js が描画し、
     操作ボタン（クローズ/変更/取消）も左ペインの trade.js が処理する。
     表示中は最低 24vh を確保して2ペイン領域を少し短くする（ユーザー要望 2026-07-15） */
  #account:not([hidden]) { flex: 0 0 auto; min-height: 24vh; max-height: 38vh; }
</style>
</head>
<body>
<!-- 2画面シェル。1段目 = 共有コントロール、2段目 = 共通ティッカー（左ペインの app.js が描画）、
     3段目 = 完全独立な index.html ×2（WS・チャート・発注とも別系統。localStorage は共有）。
     ボタン操作は左ペインへ委譲するため、接続/設定モーダルは左ペイン内に開く -->
<header id="topbar">
  <span id="logo">HL</span>
  <button id="wallet-btn">Connect</button>
  <button id="split-btn" title="1画面表示に戻す">1画面</button>
  <button id="settings-btn" title="API 接続先の設定">⚙</button>
  <button id="lang-btn" title="表示言語の切替"></button>
</header>
<div id="ticker" hidden></div>
<div id="wrap"></div>
<!-- 共有アカウント欄: 2ペイン分を重複表示せず、ここに1つだけ全幅で置く。
     id は index.html（1画面時の footer）と同じ — 別ドキュメントなので重複にならず、
     app.js は FRAMED 時に window.top.document のこちらへ描画する -->
<footer id="account" hidden>
  <div id="acct-summary">
    <div class="stat"><span class="label">総資産</span><span id="ac-equity" class="value">–</span></div>
    <div class="stat" title="Spot 口座の評価額（USDC + トークン時価）。総資産に合算されます"><span class="label">Spot 残高</span><span id="ac-spot" class="value">–</span></div>
    <div class="stat" title="Perps 口座の新規建て余力（Spot 残高は含まず — 「振替」で Perps へ移動）"><span class="label">取引可能</span><span id="ac-avail" class="value">–</span></div>
    <div class="stat" title="Perps 口座からの出金可能額（Spot の資金は「振替」で移動）"><span class="label">引き出し可能</span><span id="ac-withdraw" class="value">–</span></div>
    <div class="stat"><span class="label">証拠金使用中</span><span id="ac-margin" class="value">–</span></div>
    <div class="stat"><span class="label">未実現損益</span><span id="ac-upnl" class="value">–</span></div>
    <!-- 入出金は MetaMask 接続時のみ表示。クリック処理は左ペインの trade.js（onclick 代入） -->
    <div id="acct-xfer" hidden>
      <button id="ac-transfer" title="Spot ⇄ Perps 間で USDC を移動（手数料なし・即時）">振替</button>
      <button id="ac-deposit" title="Arbitrum の USDC をブリッジへ送金して入金（最小 5 USDC）">入金</button>
      <button id="ac-withdraw-btn" title="USDC を Arbitrum へ出金（手数料 1 USDC）">出金</button>
    </div>
  </div>
  <div id="acct-tables">
    <section>
      <h2>Positions</h2>
      <table id="positions">
        <thead><tr><th>Coin</th><th>Size</th><th>Entry</th><th>Mark</th><th>uPnL (ROE)</th><th>Liq. Px</th><th>Margin</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
    <section>
      <h2>Open Orders</h2>
      <table id="orders">
        <thead><tr><th>Coin</th><th>Side</th><th>Price</th><th>Size</th><th></th><th>Time</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>
</footer>
<script>
// 表示言語（既定 JP）。シェル自身の静的文言はここで差し替え、ペイン内は各 index.html の
// applyLang() が担当。切替は全体 reload（iframe も作り直される）
const LANG = localStorage.getItem("hlt-lang") === "en" ? "en" : "jp";
if (LANG === "en") {
  document.documentElement.lang = "en";
  const sp = document.getElementById("split-btn");
  sp.textContent = "Single";
  sp.title = "Back to single view";
  document.getElementById("settings-btn").title = "API endpoint settings";
  const acctLabels = ["Equity", "Spot Balance", "Available to Trade", "Withdrawable", "Margin Used", "uPnL"];
  const acctTitles = [null,
    "Spot account value (USDC + tokens at mid) — included in Equity",
    "Perps margin available for new positions (spot not included — use Transfer)",
    "Withdrawable from the perps account (use Transfer to move spot funds)",
    null, null];
  document.querySelectorAll("#acct-summary .stat").forEach((n, i) => {
    if (acctLabels[i]) n.querySelector(".label").textContent = acctLabels[i];
    if (acctTitles[i]) n.title = acctTitles[i];
  });
  const trf = document.getElementById("ac-transfer");
  trf.textContent = "Transfer";
  trf.title = "Move USDC between spot and perps (no fee, instant)";
  const dep = document.getElementById("ac-deposit");
  dep.textContent = "Deposit";
  dep.title = "Send USDC on Arbitrum to the bridge (min 5 USDC)";
  const wdb = document.getElementById("ac-withdraw-btn");
  wdb.textContent = "Withdraw";
  wdb.title = "Withdraw USDC to Arbitrum (fee 1 USDC)";
}
{
  const lb = document.getElementById("lang-btn");
  lb.textContent = LANG === "en" ? "EN" : "JP"; // 表記は現在の言語（2状態で入れ替わる）
  lb.title = LANG === "en" ? "Language" : "表示言語の切替";
  lb.addEventListener("click", () => {
    localStorage.setItem("hlt-lang", LANG === "en" ? "jp" : "en");
    location.reload();
  });
}

// 自分への ?user= 等のクエリを各ペインへ引き継ぐ
const q = new URLSearchParams(location.search);
q.delete("pane");
const rest = q.toString() ? "&" + q.toString() : "";
for (const p of [1, 2]) {
  const f = document.createElement("iframe");
  f.src = `index.html?pane=${p}${rest}`;
  f.title = p === 1 ? (LANG === "en" ? "Left pane" : "左ペイン") : (LANG === "en" ? "Right pane" : "右ペイン");
  document.getElementById("wrap").appendChild(f);
}

const pane1 = () => document.querySelector("#wrap iframe")?.contentWindow;

// ウォレット: 接続状態の表示は各ペインの setUser がこのボタンへ書き込む。
// クリックは左ペインの接続/切断へ委譲（接続は setUser のブロードキャストで両ペインに伝播）。
// 注意: ペインの `state` はトップレベル const のため window 越しに見えない —
// 接続中かどうかはこのボタン自身の connected クラス（setUser が付与）で判定する
document.getElementById("wallet-btn").addEventListener("click", (e) => {
  const w = pane1();
  if (!w) return;
  if (e.currentTarget.classList.contains("connected")) w.disconnectWallet?.();
  else w.openModal?.();
});

document.getElementById("split-btn").addEventListener("click", () => {
  localStorage.setItem("hlt-view", "single");
  location.href = "index.html";
});

document.getElementById("settings-btn").addEventListener("click", () => pane1()?.openSettings?.());
</script>
</body>
</html>
